name: Unzip NFT Images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configure Git Settings
      run: |
        git config --global http.postBuffer 1073741824
        git config --global core.compression 9
        git config --global http.maxRequestSize 1073741824

    - name: Create Images Directory
      run: mkdir -p images

    - name: Unzip and Extract From Root
      run: |
        for file in part*.zip; do
          if [ -f "$file" ]; then
            echo "Processing $file..."
            # Create a temporary directory for extraction
            mkdir -p temp_extract
            unzip -o "$file" -d temp_extract/
            
            # Find all images inside nested folders and move them directly to images/
            find temp_extract/ -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) -exec mv {} images/ \;
            
            # Clean up temporary directory
            rm -rf temp_extract
          fi
        done

    - name: Verify Extracted Files
      run: |
        echo "Total images successfully structured in images folder:"
        ls -1 images/ | wc -l

    - name: Commit and Push Extracted Images
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add images/
        
        if git diff-index --quiet HEAD; then
          echo "No new images detected to commit."
        else
          git commit -m "Automated unzip: Extracted images from root zip files"
          git push origin main
        fi
